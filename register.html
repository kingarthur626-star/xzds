<!DOCTYPE html>

<!-- =========================
     程式名稱：register.html
     功能說明：
     申請帳號頁面。
     使用者可在此選擇組別、壇名，
     並輸入姓名、帳號與密碼後送出申請。

     本版調整為 PWA App 風格頁面，
     讓手機主畫面開啟時更像 App。
========================= -->

<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>申請帳號</title>

  <!-- =========================
       PWA 設定
       功能說明：
       讓網站可以加入手機主畫面，
       並以類似 App 的獨立視窗開啟。
  ========================= -->
  <link rel="manifest" href="./manifest.json?v=20260620-001">
  <meta name="theme-color" content="#f5f7fb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="新莊區道務檢視">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- =========================
       全站共用樣式
       功能說明：
       載入登入頁、申請帳號、忘記密碼、首頁等共用 CSS。
  ========================= -->
  <link rel="stylesheet" href="./css/style.css?v=20260620-20" />
</head>

<body>
  <div class="app-form-page">
    <div class="app-form-shell">

      <!-- =========================
           頁面上方操作列
           功能說明：
           提供返回登入頁功能。
      ========================= -->
      <div class="app-form-header">
        <a class="app-form-back" href="index.html">← 登入</a>
      </div>

      <!-- =========================
           頁面品牌區
           功能說明：
           顯示系統 Logo 與頁面名稱。
      ========================= -->
      <div class="app-form-hero">
        <div class="app-form-logo">道</div>
        <h1 class="app-form-title">申請帳號</h1>
      </div>

      <!-- =========================
           申請帳號表單卡片
           功能說明：
           使用者填寫申請資料後送出。
      ========================= -->
      <div class="app-form-card">
        <div id="registerMessage" class="message"></div>

        <form id="registerForm">
          <!-- =========================
               組別選擇區
               功能說明：
               使用者先選第1組、第2組或第3組，
               系統再依組別載入對應壇名。
          ========================= -->
          <div class="form-group">
            <div class="label">組別：</div>

            <div class="radio-row">
              <label class="radio-item">
                <input type="radio" name="group" value="1" />
                第1組
              </label>

              <label class="radio-item">
                <input type="radio" name="group" value="2" />
                第2組
              </label>

              <label class="radio-item">
                <input type="radio" name="group" value="3" />
                第3組
              </label>
            </div>
          </div>

          <!-- =========================
               壇名選擇區
               功能說明：
               預設停用，等使用者選擇組別後，
               register.js 會載入該組壇名選項。
          ========================= -->
          <div class="form-group">
            <label for="templeSelect">壇名：</label>
            <select id="templeSelect" disabled>
              <option value="">請先圈選組別...</option>
            </select>
          </div>

          <div class="form-group">
            <label for="registerName">姓名：</label>
            <input id="registerName" type="text" placeholder="請輸入真實姓名" autocomplete="name" />
          </div>

          <div class="form-group">
            <label for="registerAccount">帳號：</label>
            <input id="registerAccount" type="email" placeholder="例如: example@gmail.com" autocomplete="email" />
          </div>

          <div class="form-group">
            <label for="registerPassword">密碼：</label>
            <input id="registerPassword" type="password" placeholder="例如: 912345678" inputmode="numeric" />
            <div class="hint">請輸入手機號碼，開頭不含0</div>
          </div>

          <button class="btn app-form-submit-btn" id="registerBtn" type="submit">送出申請</button>
        </form>
      </div>
    </div>
  </div>

  <!-- =========================
       前端共用程式
       功能說明：
       config.js：設定 Apps Script API 網址
       api.js：負責與後端 API 溝通
       common.js：共用工具函式
       register.js：申請帳號頁專用邏輯
  ========================= -->
  <script src="./js/config.js?v=20260620-2"></script>
  <script src="./js/api.js?v=20260620-2"></script>
  <script src="./js/common.js?v=20260620-2"></script>
  <script src="./js/register.js?v=20260620-2"></script>

  <!-- =========================
       PWA 控制程式
       功能說明：
       註冊 Service Worker，
       並處理系統有新版本時的更新提示。
  ========================= -->
  <script src="./js/pwa.js?v=20260620-001"></script>
</body>
</html>
