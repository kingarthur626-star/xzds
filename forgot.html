<!DOCTYPE html>

<!-- =========================
     程式名稱：forgot.html
     功能說明：
     忘記密碼 / 變更密碼頁面。
     使用者可在此選擇組別、壇名，
     並輸入姓名、帳號與新密碼，
     系統確認身份後更新密碼。

     本頁也加入 PWA 設定，
     讓網站可以加入手機主畫面，
     並以類似 App 的方式開啟。
========================= -->

<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>忘記密碼 / 變更密碼</title>

  <!-- =========================
       PWA 設定
       功能說明：
       讓網站可以加入手機主畫面，
       並以類似 App 的獨立視窗開啟。
  ========================= -->
  <link rel="manifest" href="./manifest.json?v=20260620-001">
  <meta name="theme-color" content="#f5f7fb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="新莊區道務檢視">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- =========================
       全站共用樣式
       功能說明：
       載入登入頁、申請帳號、忘記密碼、首頁等共用 CSS。
  ========================= -->
  <link rel="stylesheet" href="./css/style.css?v=20260620-2" />
</head>

<body>
  <div class="page">
    <div class="card">
      <h1>忘記密碼 / 變更密碼</h1>

      <!-- =========================
           訊息顯示區
           功能說明：
           顯示身份確認失敗、密碼格式錯誤、
           修改成功或系統錯誤等訊息。
      ========================= -->
      <div id="forgotMessage" class="message"></div>

      <!-- =========================
           忘記 / 變更密碼表單
           功能說明：
           使用者填寫身份資料與新密碼後送出，
           由 forgot.js 呼叫後端 resetPassword。
      ========================= -->
      <form id="forgotForm">

        <!-- =========================
             組別選擇區
             功能說明：
             使用者先選第1組、第2組或第3組，
             系統再依組別載入對應壇名。
        ========================= -->
        <div class="form-group">
          <div class="label">組別：</div>

          <div class="radio-row">
            <label class="radio-item">
              <input type="radio" name="forgotGroup" value="1" />
              第1組
            </label>

            <label class="radio-item">
              <input type="radio" name="forgotGroup" value="2" />
              第2組
            </label>

            <label class="radio-item">
              <input type="radio" name="forgotGroup" value="3" />
              第3組
            </label>
          </div>
        </div>

        <!-- =========================
             壇名選擇區
             功能說明：
             預設停用，等使用者選擇組別後，
             forgot.js 會載入該組壇名選項。
        ========================= -->
        <div class="form-group">
          <label for="forgotTempleSelect">壇名：</label>
          <select id="forgotTempleSelect" disabled>
            <option value="">請先圈選組別...</option>
          </select>
        </div>

        <!-- =========================
             姓名欄位
             功能說明：
             使用者輸入真實姓名，
             後端會用來比對帳號名單中的資料。
        ========================= -->
        <div class="form-group">
          <label for="forgotName">姓名：</label>
          <input id="forgotName" type="text" placeholder="請輸入真實姓名" autocomplete="name" />
        </div>

        <!-- =========================
             帳號欄位
             功能說明：
             使用者輸入已註冊的 Gmail 帳號，
             後端會比對是否與壇名、姓名一致。
        ========================= -->
        <div class="form-group">
          <label for="forgotAccount">帳號：</label>
          <input id="forgotAccount" type="email" placeholder="請輸入註冊的 Gmail" autocomplete="email" />
        </div>

        <!-- =========================
             新密碼欄位
             功能說明：
             使用者輸入新密碼。
             規則為至少 8 碼，且需包含英文大寫、小寫與數字。
        ========================= -->
        <div class="form-group">
          <label for="forgotNewPassword">新密碼：</label>
          <input id="forgotNewPassword" type="password" placeholder="至少8碼，含英文大小寫與數字" autocomplete="new-password" />
          <div class="hint">新密碼需包含英文大寫、小寫與數字，至少8碼</div>
        </div>

        <button class="btn" id="forgotBtn" type="submit">確認身份並修改密碼</button>
      </form>

      <!-- =========================
           返回登入
           功能說明：
           使用者可回到 index.html 登入頁。
      ========================= -->
      <div class="link-row">
        <a class="text-link" href="index.html">返回登入</a>
      </div>
    </div>
  </div>

  <!-- =========================
       前端共用程式
       功能說明：
       config.js：設定 Apps Script API 網址
       api.js：負責與後端 API 溝通
       common.js：共用工具函式
       forgot.js：忘記 / 變更密碼頁專用邏輯
  ========================= -->
  <script src="./js/config.js?v=20260620-2"></script>
  <script src="./js/api.js?v=20260620-2"></script>
  <script src="./js/common.js?v=20260620-2"></script>
  <script src="./js/forgot.js?v=20260620-2"></script>

  <!-- =========================
       PWA 控制程式
       功能說明：
       註冊 Service Worker，
       並處理系統有新版本時的更新提示。
  ========================= -->
  <script src="./js/pwa.js?v=20260620-001"></script>
</body>
</html>
