<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新莊區 道務檢視</title>
  <link rel="stylesheet" href="./css/style.css?v=20260619-4">
</head>
<body>
  <div class="page login-page">
    <div class="card login-card">
      <div class="login-hero">
        <div class="login-logo">道</div>
        <h1 class="login-title">新莊區 道務檢視</h1>
      </div>

      <div id="messageBox" class="message"></div>

      <div class="form-group">
        <label for="account">帳號</label>
        <input id="account" type="text" placeholder="請輸入帳號">
      </div>

      <div class="form-group">
        <label for="password">密碼</label>
        <input id="password" type="password" placeholder="請輸入密碼">
      </div>

      <div class="form-group">
        <label for="captchaInput">輸入驗證碼</label>

        <div class="captcha-panel">
          <div class="captcha-input-wrap">
            <input id="captchaInput" type="text" placeholder="請輸入驗證碼">
          </div>

          <div class="captcha-side">
            <img id="captchaImage" class="captcha-image" src="" alt="驗證碼圖片">
            <button id="refreshCaptchaBtn" class="captcha-refresh" type="button">更新驗證碼</button>
          </div>
        </div>
      </div>

      <button id="loginBtn" class="btn" type="button">登入</button>

      <div class="login-link-row">
        <a class="text-link" href="register.html">申請帳號</a>
        <a class="text-link" href="forgot.html">忘記/變更密碼</a>
      </div>
    </div>
  </div>

  <script src="./js/config.js?v=20260619-4"></script>
  <script src="./js/api.js?v=20260619-4"></script>
  <script src="./js/common.js?v=20260619-4"></script>
  <script src="./js/login.js?v=20260619-4"></script>
</body>
</html>
