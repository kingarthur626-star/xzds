<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新莊區 道務檢視</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: "Microsoft JhengHei", sans-serif; }
        .login-card { width: 100%; max-width: 450px; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .blue-link { color: #0d6efd; text-decoration: none; cursor: pointer; }
        .blue-link:hover { text-decoration: underline; }
        .hint-text { font-size: 0.85em; color: #6c757d; }
    </style>
</head>
<body>

<div class="login-card">
    <div id="loginSection">
        <h3 class="text-center mb-4">新莊區 道務檢視</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">登入帳號：</label>
                <input type="email" id="l_acc" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">登入密碼：</label>
                <input type="password" id="l_pwd" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="l_btn">登 入</button>
        </form>
        <div class="text-end mt-3">
            <a class="blue-link" onclick="switchView('register')">申請帳號</a>
        </div>
    </div>

    <div id="registerSection" class="d-none">
        <h3 class="text-center mb-4">申請帳號</h3>
        <form id="regForm">
            <div class="mb-3">
                <label class="form-label">組別：</label>
                <div class="d-flex gap-3">
                    <label><input type="radio" name="group" value="1" required> 第1組</label>
                    <label><input type="radio" name="group" value="2"> 第2組</label>
                    <label><input type="radio" name="group" value="3"> 第3組</label>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">壇名：</label>
                <select id="r_altar" class="form-select" required>
                    <option value="">請先圈選組別...</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">姓名：</label>
                <input type="text" id="r_name" class="form-control" placeholder="請輸入真實姓名" required>
            </div>
            <div class="mb-3">
                <label class="form-label">帳號：</label>
                <input type="email" id="r_acc" class="form-control" placeholder="例如: example@gmail.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">密碼：</label>
                <input type="text" id="r_pwd" class="form-control" placeholder="例如: 912345678" required>
                <div class="hint-text mt-1">請輸入手機號碼，開頭不含0</div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="r_btn">送出申請</button>
        </form>
        <div class="text-end mt-3">
            <a class="blue-link" onclick="switchView('login')">返回登入</a>
        </div>
    </div>
</div>

<script>
    // 填入部署後的 GAS 網址
    const API_URL = 'https://script.google.com/macros/s/AKfycbzYy9E5wpf6FhXYHMriLWbsiMrcjKPqQUSyyP2sqBPNyRGDe6ZuhD6mjvd-JMAPcPK2Hg/exec'; 
    let altarsData = { '1': [], '2': [], '3': [] };

    // 取得壇名資料
    fetch(`${API_URL}?action=getAltars`)
        .then(res => res.json())
        .then(data => { if(data.success) altarsData = data.altars; });

    // 切換畫面
    function switchView(view) {
        document.getElementById('loginSection').classList.toggle('d-none', view !== 'login');
        document.getElementById('registerSection').classList.toggle('d-none', view !== 'register');
    }

    // 連動下拉選單
    document.querySelectorAll('input[name="group"]').forEach(radio => {
        radio.addEventListener('change', e => {
            const select = document.getElementById('r_altar');
            select.innerHTML = '<option value="">請選擇壇名...</option>';
            const group = e.target.value;
            if (altarsData[group]) {
                altarsData[group].forEach(name => {
                    select.add(new Option(name, name));
                });
            }
        });
    });

    // 處理登入
    document.getElementById('loginForm').onsubmit = e => {
        e.preventDefault();
        const btn = document.getElementById('l_btn');
        btn.disabled = true; btn.innerText = '處理中...';
        
        const params = new URLSearchParams({
            action: 'login',
            account: document.getElementById('l_acc').value,
            password: document.getElementById('l_pwd').value
        });

        fetch(`${API_URL}?${params}`)
            .then(res => res.json())
            .then(data => alert(data.message))
            .finally(() => { btn.disabled = false; btn.innerText = '登 入'; });
    };

    // 處理註冊
    document.getElementById('regForm').onsubmit = e => {
        e.preventDefault();
        const btn = document.getElementById('r_btn');
        btn.disabled = true; btn.innerText = '處理中...';
        
        const params = new URLSearchParams({
            action: 'register',
            altar: document.getElementById('r_altar').value,
            name: document.getElementById('r_name').value,
            account: document.getElementById('r_acc').value,
            password: document.getElementById('r_pwd').value
        });

        fetch(`${API_URL}?${params}`)
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    document.getElementById('regForm').reset();
                    switchView('login');
                }
            })
            .finally(() => { btn.disabled = false; btn.innerText = '送出申請'; });
    };
</script>
</body>
</html>
