<!DOCTYPE html>

<!-- =========================
     程式名稱：index.html
     功能說明：
     系統登入頁。
     本版調整為「滿版 App 登入頁」：
     1. 上方顯示系統 Logo 與標題
     2. 中間顯示帳號、密碼、驗證碼與登入按鈕
     3. 下方固定顯示申請帳號與忘記/變更密碼
     4. 支援 PWA，加入手機主畫面後更像 App

     注意：
     本頁保留 login.js 需要的所有 ID，
     所以不用修改 login.js。
========================= -->

<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>新莊區 道務檢視</title>

  <!-- =========================
       PWA 設定
       功能說明：
       讓網站可以加入手機主畫面，
       並以類似 App 的獨立視窗開啟。
  ========================= -->

  <link rel="manifest" href="./manifest.json?v=20260620-001">
  <meta name="theme-color" content="#f5f7fb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="新莊區道務檢視">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- =========================
       全站共用樣式
       功能說明：
       載入登入頁、首頁、今年道務、近年道務等共用 CSS。
  ========================= -->

  <link rel="stylesheet" href="./css/style.css?v=20260620-7">
</head>

<body>
  <!-- =========================
       滿版 App 登入頁
       功能說明：
       使用 app-login-page 作為登入頁主容器，
       讓登入頁在 PWA 中更像手機 App。
  ========================= -->
  <div class="app-login-page">


<!-- =========================
     App 登入頁內容容器
     功能說明：
     包含上方品牌區、中間登入區、下方連結區。
========================= -->
<div class="app-login-shell">

  <!-- =========================
       上方品牌區
       功能說明：
       顯示系統 Logo、系統名稱與簡短說明。
  ========================= -->
  <header class="app-login-header">
    <div class="app-login-logo">道</div>

    <div class="app-login-title-group">
      <h1 class="app-login-title">新莊區 道務檢視</h1>
    </div>
  </header>

  <!-- =========================
       中間登入卡片
       功能說明：
       使用者在此輸入帳號、密碼與驗證碼。
  ========================= -->
  <main class="app-login-main">
    <section class="app-login-card">

      <!-- =========================
           登入訊息區
           功能說明：
           顯示登入失敗、驗證碼錯誤或系統提示。
      ========================= -->
      <div id="loginMessage" class="message"></div>

      <!-- =========================
           登入表單
           功能說明：
           login.js 會綁定 loginForm，
           使用者送出後呼叫後端 login。
      ========================= -->
      <form id="loginForm">

        <!-- =========================
             帳號欄位
             功能說明：
             使用者輸入登入帳號。
        ========================= -->
        <div class="form-group app-form-group">
          <label for="loginAccount">帳號</label>
          <input id="loginAccount" type="text" placeholder="請輸入帳號" autocomplete="username">
        </div>

        <!-- =========================
             密碼欄位
             功能說明：
             使用者輸入登入密碼。
        ========================= -->
        <div class="form-group app-form-group">
          <label for="loginPassword">密碼</label>
          <input id="loginPassword" type="password" placeholder="請輸入密碼" autocomplete="current-password">
        </div>

        <!-- =========================
             驗證碼區
             功能說明：
             顯示 4 碼驗證碼。
             使用者需輸入正確驗證碼才能登入。
        ========================= -->
        <div class="form-group app-form-group">
          <label for="captchaInput">驗證碼</label>

          <div class="captcha-panel app-captcha-panel">
            <div class="captcha-input-wrap">
              <input id="captchaInput" type="text" placeholder="請輸入4碼驗證碼" autocomplete="off" inputmode="numeric" maxlength="4">
            </div>

            <div class="captcha-side">
              <img id="captchaImage" class="captcha-image" src="" alt="驗證碼圖片">
              <button id="refreshCaptchaBtn" class="captcha-refresh" type="button">更新驗證碼</button>
            </div>
          </div>
        </div>

        <!-- =========================
             登入按鈕
             功能說明：
             送出帳號、密碼與驗證碼。
        ========================= -->
        <button id="loginBtn" class="btn app-login-btn" type="submit">登入</button>
      </form>
    </section>
  </main>

  <!-- =========================
       下方連結區
       功能說明：
       提供申請帳號與忘記 / 變更密碼入口。
  ========================= -->
  <footer class="app-login-footer">
    <a class="app-login-link" href="register.html">申請帳號</a>
    <span class="app-login-divider"></span>
    <a class="app-login-link" href="forgot.html">忘記 / 變更密碼</a>
  </footer>

</div>


  </div>

  <!-- =========================
       前端共用程式
       功能說明：
       config.js：設定 Apps Script API 網址
       api.js：負責與後端 API 溝通
       common.js：共用登入狀態與工具函式
       login.js：登入頁專用邏輯
  ========================= -->

  <script src="./js/config.js?v=20260619-5"></script>

  <script src="./js/api.js?v=20260619-5"></script>

  <script src="./js/common.js?v=20260619-5"></script>

  <script src="./js/login.js?v=20260619-5"></script>

  <!-- =========================
       PWA 控制程式
       功能說明：
       註冊 Service Worker，
       並處理系統有新版本時的更新提示。
  ========================= -->

  <script src="./js/pwa.js?v=20260620-001"></script>

</body>
</html>
