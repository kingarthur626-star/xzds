<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>新莊區 道務檢視</title>

  <link rel="stylesheet" href="css/style.css?v=10" />
</head>

<body>
  <div class="page">
    <div class="card">
      <h1>新莊區 道務檢視</h1>

      <div id="loginMessage" class="message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginAccount">登入帳號</label>
          <input
            type="email"
            id="loginAccount"
            placeholder="請輸入帳號"
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="loginPassword">登入密碼</label>
          <input
            type="password"
            id="loginPassword"
            placeholder="請輸入密碼"
            autocomplete="current-password"
          />
        </div>

        <div class="form-group">
          <label for="captchaInput">驗證碼</label>

          <div class="captcha-row">
            <input
              type="text"
              id="captchaInput"
              placeholder="請輸入驗證碼"
              autocomplete="off"
            />

            <img id="captchaImage" class="captcha-image" alt="驗證碼" />

            <button
              class="captcha-refresh"
              id="refreshCaptchaBtn"
              type="button"
            >
              更新
            </button>
          </div>
        </div>

        <button class="btn" type="submit">登入</button>
      </form>

      <div class="login-link-row">
        <a class="text-link" href="register.html">申請帳號</a>
        <a class="text-link" href="forgot.html">忘記密碼</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js?v=10"></script>
  <script src="js/common.js?v=10"></script>
  <script src="js/login.js?v=10"></script>
</body>
</html>
