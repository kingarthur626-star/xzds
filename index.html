<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>新莊區 道務檢視</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f5f7fb;
      color: #1f3b57;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 12px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      padding: 28px 24px 36px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      font-size: 26px;
      margin: 0 0 34px;
      color: #173b5c;
      font-weight: 700;
    }

    label,
    .label {
      display: block;
      font-size: 18px;
      font-weight: 700;
      color: #164568;
      margin-bottom: 10px;
    }

    .form-group {
      margin-bottom: 22px;
    }

    input,
    select {
      width: 100%;
      height: 48px;
      border: 1px solid #d7dde6;
      border-radius: 6px;
      font-size: 16px;
      padding: 0 14px;
      color: #1f3b57;
      background: #ffffff;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.18);
    }

    input::placeholder {
      color: #8b98a8;
    }

    select:disabled {
      background: #f7f8fa;
      color: #999999;
    }

    .hint {
      margin-top: 8px;
      font-size: 14px;
      color: #64748b;
    }

    .btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 6px;
      background: #4a90e2;
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 14px;
    }

    .btn:hover {
      background: #357bd0;
    }

    .btn:disabled {
      background: #9bbfe8;
      cursor: not-allowed;
    }

    .link-row {
      text-align: right;
      margin-top: 24px;
    }

    .text-link {
      color: #2f80ed;
      text-decoration: none;
      font-size: 16px;
      cursor: pointer;
      font-weight: 500;
    }

    .text-link:hover {
      text-decoration: underline;
    }

    .radio-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 4px;
    }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 17px;
      font-weight: 700;
      color: #174869;
      white-space: nowrap;
    }

    .radio-item input {
      width: 20px;
      height: 20px;
      accent-color: #4a90e2;
    }

    .message {
      display: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 15px;
      margin-bottom: 18px;
      line-height: 1.5;
      word-break: break-word;
    }

    .message.success {
      display: block;
      background: #e9f8ef;
      color: #1d7a43;
      border: 1px solid #bfe7cc;
    }

    .message.error {
      display: block;
      background: #fff0f0;
      color: #b42318;
      border: 1px solid #f3b8b5;
    }

    .hidden {
      display: none;
    }

    .login-success {
      text-align: center;
      line-height: 1.8;
      font-size: 18px;
      color: #164568;
    }

    .small-text {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-top: 16px;
      text-align: center;
    }

    @media (max-width: 480px) {
      .page {
        padding: 0;
        background: #ffffff;
      }

      .card {
        box-shadow: none;
        border-radius: 0;
        padding: 24px 20px 34px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- 登入畫面 -->
    <div class="card" id="loginPage">
      <h1>新莊區 道務檢視</h1>

      <div id="loginMessage" class="message"></div>

      <div class="form-group">
        <label for="loginAccount">登入帳號</label>
        <input
          id="loginAccount"
          type="email"
          placeholder="請輸入帳號"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="loginPassword">登入密碼</label>
        <input
          id="loginPassword"
          type="password"
          placeholder="請輸入密碼"
          autocomplete="current-password"
        />
      </div>

      <button class="btn" id="loginBtn" onclick="handleLogin()">登入</button>

      <div class="link-row">
        <a class="text-link" onclick="showRegisterPage()">申請帳號</a>
      </div>
    </div>

    <!-- 申請帳號畫面 -->
    <div class="card hidden" id="registerPage">
      <h1>申請帳號</h1>

      <div id="registerMessage" class="message"></div>

      <div class="form-group">
        <div class="label">組別：</div>

        <div class="radio-row">
          <label class="radio-item">
            <input type="radio" name="group" value="1" onchange="handleGroupChange()" />
            第1組
          </label>

          <label class="radio-item">
            <input type="radio" name="group" value="2" onchange="handleGroupChange()" />
            第2組
          </label>

          <label class="radio-item">
            <input type="radio" name="group" value="3" onchange="handleGroupChange()" />
            第3組
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="templeSelect">壇名：</label>
        <select id="templeSelect" disabled>
          <option value="">請先圈選組別...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="registerName">姓名：</label>
        <input
          id="registerName"
          type="text"
          placeholder="請輸入真實姓名"
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label for="registerAccount">帳號：</label>
        <input
          id="registerAccount"
          type="email"
          placeholder="例如: example@gmail.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="registerPassword">密碼：</label>
        <input
          id="registerPassword"
          type="password"
          placeholder="例如: 912345678"
          inputmode="numeric"
        />
        <div class="hint">請輸入手機號碼，開頭不含0</div>
      </div>

      <button class="btn" id="registerBtn" onclick="handleRegister()">送出申請</button>

      <div class="link-row">
        <a class="text-link" onclick="showLoginPage()">返回登入</a>
      </div>
    </div>

    <!-- 登入成功畫面 -->
    <div class="card hidden" id="homePage">
      <h1>新莊區 道務檢視</h1>

      <div class="login-success" id="homeContent"></div>

      <button class="btn" onclick="logout()">登出</button>
    </div>

  </div>

  <script>
    // 這裡一定要換成你的 Apps Script Web App URL
    // 格式應該是：https://script.google.com/macros/s/你的部署ID/exec
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyw628uSOoW2OwhzInAmtISkzdNm5pGGShZ2-5tqek5udNBDp-Lvf_T4kKPCm9RBvZ1Zg/exec';

    function callApi(payload) {
      return new Promise(function(resolve, reject) {
        if (!GAS_URL || GAS_URL.includes('請貼上')) {
          reject(new Error('尚未設定 Apps Script Web App URL'));
          return;
        }

        const callbackName = 'gasCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

        payload.callback = callbackName;
        payload._t = Date.now();

        const params = new URLSearchParams(payload);
        const script = document.createElement('script');

        const timer = setTimeout(function() {
          cleanup();
          reject(new Error('連線逾時，請確認 Apps Script 是否已部署為 Web App'));
        }, 15000);

        window[callbackName] = function(result) {
          cleanup();
          resolve(result);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error('無法連線到 Apps Script，請確認網址與部署權限'));
        };

        function cleanup() {
          clearTimeout(timer);

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }

          try {
            delete window[callbackName];
          } catch (err) {
            window[callbackName] = undefined;
          }
        }

        script.src = GAS_URL + '?' + params.toString();
        document.body.appendChild(script);
      });
    }

    function showMessage(elementId, type, text) {
      const el = document.getElementById(elementId);
      el.className = 'message ' + type;
      el.textContent = text;
    }

    function clearMessage(elementId) {
      const el = document.getElementById(elementId);
      el.className = 'message';
      el.textContent = '';
    }

    function showLoginPage() {
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('registerPage').classList.add('hidden');
      document.getElementById('homePage').classList.add('hidden');

      clearMessage('loginMessage');
      clearMessage('registerMessage');
    }

    function showRegisterPage() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('registerPage').classList.remove('hidden');
      document.getElementById('homePage').classList.add('hidden');

      clearMessage('registerMessage');
    }

    function showHomePage(user) {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('registerPage').classList.add('hidden');
      document.getElementById('homePage').classList.remove('hidden');

      document.getElementById('homeContent').innerHTML = `
        <p>登入成功</p>
        <p>${escapeHtml(user.temple)}　${escapeHtml(user.name)}</p>
        <p class="small-text">帳號：${escapeHtml(user.account)}</p>
      `;
    }

    function getSelectedGroup() {
      const checked = document.querySelector('input[name="group"]:checked');
      return checked ? checked.value : '';
    }

    async function handleGroupChange() {
      clearMessage('registerMessage');

      const group = getSelectedGroup();
      const templeSelect = document.getElementById('templeSelect');

      templeSelect.innerHTML = '<option value="">讀取中...</option>';
      templeSelect.disabled = true;

      try {
        const result = await callApi({
          action: 'getTemples',
          group: group
        });

        if (!result.success) {
          templeSelect.innerHTML = '<option value="">請先圈選組別...</option>';
          showMessage('registerMessage', 'error', result.message || '壇名讀取失敗');
          return;
        }

        templeSelect.innerHTML = '<option value="">請選擇壇名</option>';

        if (!result.temples || result.temples.length === 0) {
          templeSelect.innerHTML = '<option value="">此組別目前沒有壇名</option>';
          templeSelect.disabled = true;
          return;
        }

        result.temples.forEach(function(temple) {
          const option = document.createElement('option');
          option.value = temple;
          option.textContent = temple;
          templeSelect.appendChild(option);
        });

        templeSelect.disabled = false;

      } catch (err) {
        templeSelect.innerHTML = '<option value="">請先圈選組別...</option>';
        showMessage('registerMessage', 'error', err.message || '壇名讀取失敗，請稍後再試');
      }
    }

    async function handleLogin() {
      clearMessage('loginMessage');

      const btn = document.getElementById('loginBtn');
      const account = document.getElementById('loginAccount').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      if (!account || !password) {
        showMessage('loginMessage', 'error', '請輸入登入帳號與登入密碼');
        return;
      }

      btn.disabled = true;
      btn.textContent = '登入中...';

      try {
        const result = await callApi({
          action: 'login',
          account: account,
          password: password
        });

        if (result.success) {
          showHomePage(result.user);
        } else {
          showMessage('loginMessage', 'error', result.message || '登入失敗');
        }

      } catch (err) {
        showMessage('loginMessage', 'error', err.message || '系統連線失敗，請稍後再試');
      } finally {
        btn.disabled = false;
        btn.textContent = '登入';
      }
    }

    async function handleRegister() {
      clearMessage('registerMessage');

      const btn = document.getElementById('registerBtn');

      const group = getSelectedGroup();
      const temple = document.getElementById('templeSelect').value.trim();
      const name = document.getElementById('registerName').value.trim();
      const account = document.getElementById('registerAccount').value.trim();
      const password = document.getElementById('registerPassword').value.trim();

      if (!group) {
        showMessage('registerMessage', 'error', '請選擇組別');
        return;
      }

      if (!temple) {
        showMessage('registerMessage', 'error', '請選擇壇名');
        return;
      }

      if (!name) {
        showMessage('registerMessage', 'error', '請輸入姓名');
        return;
      }

      if (!account) {
        showMessage('registerMessage', 'error', '請輸入帳號');
        return;
      }

      if (!password) {
        showMessage('registerMessage', 'error', '請輸入密碼');
        return;
      }

      btn.disabled = true;
      btn.textContent = '送出中...';

      try {
        const result = await callApi({
          action: 'register',
          group: group,
          temple: temple,
          name: name,
          account: account,
          password: password
        });

        if (result.success) {
          showMessage('registerMessage', 'success', result.message || '帳號申請成功');

          document.getElementById('registerName').value = '';
          document.getElementById('registerAccount').value = '';
          document.getElementById('registerPassword').value = '';

        } else {
          showMessage('registerMessage', 'error', result.message || '申請失敗');
        }

      } catch (err) {
        showMessage('registerMessage', 'error', err.message || '系統連線失敗，請稍後再試');
      } finally {
        btn.disabled = false;
        btn.textContent = '送出申請';
      }
    }

    function logout() {
      document.getElementById('loginAccount').value = '';
      document.getElementById('loginPassword').value = '';

      showLoginPage();
    }

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;

      if (!document.getElementById('loginPage').classList.contains('hidden')) {
        handleLogin();
      } else if (!document.getElementById('registerPage').classList.contains('hidden')) {
        handleRegister();
      }
    });
  </script>
</body>
</html>
